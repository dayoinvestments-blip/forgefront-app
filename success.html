<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Payment Successful — ForgeFront</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0A0C0F;color:#F0F2F5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.box{width:100%;max-width:420px;text-align:center}
.icon{font-size:56px;margin-bottom:20px}
.badge{display:inline-block;background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);color:#00E5A0;padding:5px 16px;border-radius:99px;font-size:12px;font-weight:700;margin-bottom:20px}
h1{font-size:24px;font-weight:800;margin-bottom:10px}
p{font-size:14px;color:#A8B3C0;line-height:1.65;margin-bottom:24px}
.btn{display:inline-block;background:#00E5A0;color:#0A0C0F;padding:13px 32px;border-radius:10px;font-size:15px;font-weight:700;text-decoration:none}
.note{font-size:12px;color:#7A8494;margin-top:14px}
</style>
</head>
<body>
<div class="box">
  <div class="icon">&#127894;</div>
  <div class="badge" id="badge">PRO PLAN ACTIVATED</div>
  <h1>Payment confirmed.</h1>
  <p>Your ForgeFront subscription is active. You now have full access to unlimited contracts, AI proposals, and the complete SDVOSB command center.</p>
  <a href="/" class="btn">Launch ForgeFront &rarr;</a>
  <p class="note" id="note">Redirecting in <span id="n">5</span> seconds...</p>
</div>
<script>
var plan = new URLSearchParams(location.search).get('plan') || 'pro_monthly';
var labels = {base_monthly:'BASE PLAN ACTIVATED', pro_monthly:'PRO PLAN ACTIVATED', pro_annual:'PRO ANNUAL ACTIVATED'};
var b = document.getElementById('badge');
if (b && labels[plan]) b.textContent = labels[plan];
try {
  var pending = plan.indexOf('base') >= 0 ? 'base' : 'pro';
  localStorage.setItem('ff_pending_tier', pending);
} catch(e) {}
var t = 5;
var iv = setInterval(function() {
  t--;
  var el = document.getElementById('n');
  if (el) el.textContent = t;
  if (t <= 0) { clearInterval(iv); location.href = '/'; }
}, 1000);
</script>
</body>
</html>
